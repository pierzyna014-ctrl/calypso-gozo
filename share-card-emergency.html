<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400;1,9..144,500&display=swap" rel="stylesheet"/>
<style>
  :root{--gold:#c8a24c;--gold-soft:#ecd9a8;--ui:'Inter',sans-serif;--serif:'Fraunces',Georgia,serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{position:relative;width:1200px;height:630px;display:flex;
    background:radial-gradient(125% 95% at 30% -10%, #0a2330 0%, #051019 50%, #03080e 100%);
    color:#fff;font-family:var(--ui);font-weight:300}
  /* logo po prawej (zamiast zdjęcia) */
  .brandpanel{position:absolute;right:0;top:0;width:47%;height:100%;display:flex;align-items:center;justify-content:center}
  .brandpanel::before{content:"";position:absolute;inset:0;background:radial-gradient(60% 60% at 56% 50%, rgba(236,217,168,.13), transparent 70%)}
  .brandpanel img{position:relative;width:420px;height:auto;
    filter:drop-shadow(0 16px 50px rgba(0,0,0,.55)) drop-shadow(0 0 68px rgba(236,217,168,.26))}
  /* delikatna złota linia oddzielająca */
  .brandpanel::after{content:"";position:absolute;left:0;top:18%;height:64%;width:1px;background:linear-gradient(180deg,transparent,rgba(236,217,168,.35),transparent)}
  /* tekst po lewej */
  .left{position:relative;z-index:2;width:53%;height:100%;padding:64px 32px 56px 72px;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{display:flex;align-items:center;gap:14px;color:var(--gold);font-size:15px;letter-spacing:.36em;text-transform:uppercase;font-weight:400;margin-bottom:22px}
  .eyebrow::before{content:"";width:40px;height:1px;background:rgba(236,217,168,.55)}
  h1{font-weight:200;font-size:52px;line-height:1.08;letter-spacing:-.015em;text-wrap:balance}
  h1 b{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold-soft)}
  .sub{margin-top:22px;font-size:23px;line-height:1.45;color:rgba(255,255,255,.82);font-weight:300;max-width:520px}
  .sub b{color:var(--gold-soft);font-weight:500}
  .foot{margin-top:34px;display:flex;align-items:baseline;gap:14px}
  .foot .lbl{font-size:13px;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:400}
  .foot .name{font-family:var(--serif);font-style:italic;font-weight:400;font-size:26px;color:var(--gold-soft)}
</style>
</head>
<body>
  <div class="card">
    <div class="brandpanel"><img src="assets/logo.png" alt=""/></div>
    <div class="left">
      <div class="eyebrow">Emergency services rate</div>
      <h1>Dive beneath the surface with <b>Calypso</b>.</h1>
      <p class="sub">Enjoy <b>10% off</b> diving in Gozo. Your emergency services rate.</p>
      <div class="foot">
        <span class="lbl">Exclusively for</span>
        <span class="name">emergency services divers</span>
      </div>
    </div>
  </div>
</body>
</html>
